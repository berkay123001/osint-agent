version: "3.8"

services:
  # Self-hosted metasearch engine — 100+ arama motorunu aggregate eder
  # JSON API: http://localhost:8888/search?q=test&format=json
  searxng:
    image: searxng/searxng:latest
    container_name: osint-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/

  # Face recognition + age/gender/emotion analysis
  # REST API: POST http://localhost:5000/analyze, /verify, /represent
  deepface:
    image: serengil/deepface:latest
    container_name: osint-deepface
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - deepface_weights:/root/.deepface/weights
    environment:
      - DEEPFACE_FACE_RECOGNITION_MODELS=Facenet
      - GUNICORN_CMD_ARGS=--timeout 600 --workers 1
    # Model weights persist in named volume — downloaded once, reused forever
    # Cold start: ~30-60s (first request loads models into RAM)
    # Warm: ~2-5s per analyze, ~3-8s per verify

volumes:
  deepface_weights:
